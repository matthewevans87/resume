<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="description" content="Professional Resume" />
    <title>Resume</title>
    <link rel="stylesheet" href="styles.css" />
    <link rel="stylesheet" href="print.css" media="print" />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:opsz,wght,FILL,GRAD@20..48,100..700,0..1,-50..200"
    />
    <link rel="apple-touch-icon" sizes="180x180" href="favicons/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="favicons/favicon-32x32.png" />
    <link rel="icon" type="image/png" sizes="16x16" href="favicons/favicon-16x16.png" />
    <link rel="manifest" href="favicons/site.webmanifest" />
    <meta name="msapplication-TileColor" content="#da532c" />
    <meta name="theme-color" content="#ffffff" />
  </head>
  <body>
    <div id="resume" class="container">
      <!-- Header Section -->
      <header class="resume-header">
        <h1 id="full-name"></h1>
        <div id="contact-info" class="contact-info"></div>
        <p id="mission-statement" class="mission-statement"></p>
        <p id="tagline" class="tagline"></p>
      </header>

      <!-- Career Timeline Visualization -->
      <div id="career-timeline-viz" class="career-timeline-viz"></div>

      <!-- Experience Section -->
      <section id="experience-section" class="section">
        <h2>Experience</h2>
        <div id="experience-timeline" class="timeline"></div>
      </section>

      <!-- Projects Section -->
      <section id="projects-section" class="section">
        <h2>Projects</h2>
        <div id="projects-list" class="projects"></div>
      </section>

      <!-- Education Section -->
      <section id="education-section" class="section">
        <h2>Education</h2>
        <div id="education-list" class="education"></div>
      </section>

      <!-- Achievements Section -->
      <section id="achievements-section" class="section">
        <h2>Achievements</h2>
        <ul id="achievements-list" class="achievements"></ul>
      </section>

      <!-- Skills Section -->
      <section id="skills-section" class="section">
        <h2>Skills</h2>
        <div id="skills-list" class="skills"></div>
      </section>
    </div>

    <!-- Notifications -->
    <div id="notifications"></div>

    <!-- Confirmation Modal -->
    <div id="confirmation-modal" class="modal">
      <div class="modal-content">
        <p id="modal-message" class="modal-message"></p>
        <div class="modal-buttons">
          <button id="modal-no" class="modal-btn modal-btn-no">No</button>
          <button id="modal-yes" class="modal-btn modal-btn-yes">Yes</button>
        </div>
      </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/js-yaml@4.1.0/dist/js-yaml.min.js"></script>
    <script src="app.js"></script>
  </body>
</html>
