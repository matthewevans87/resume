  elements:
    - key: expedia-learning-to-rank
      group: machine_learning
      type: personal
      name: "Two-Stage Retrieval and Ranking Pipeline on Real-World Search Logs"
      url: "https://github.com/matthewevans87/expedia-ltr"
      description: "Built an end-to-end retrieval and ranking system on ~1M real-world search logs — two-tower embedding model for candidate retrieval, neural listwise ranker, and LightGBM LambdaRank baseline, with query-grouped evaluation (NDCG@k, MRR, Recall@k) and an 18-run hyperparameter sweep."
      role: "Research Engineer / Author"
      start_date: "2026-06"
      end_date: "2026-06"
      highlights:
        - [
            "Feature taxonomy and embedding architecture:",
            "Decomposed ~50 signals into query-level, item-level, and interaction features; assigned towers via importance analysis — dominant item signals to item embeddings, context signals to query tower, cross-features reserved for the ranker. Separate Dense 128→64 towers with L2-normalized output and dot-product similarity. Recall@20 0.781.",
          ]
        - [
            "Evaluation harness:",
            "Implemented NDCG@k, MRR, and Recall@k computed per query group; two-tower evaluated on Recall@k, ranker on NDCG@k and MRR.",
          ]
        - [
            "Baseline and ablation sweep:",
            "LightGBM LambdaRank with graded relevance labels (click=1, booking=5); 18-run sweep (num_leaves × learning_rate × 3 seeds) yielded NDCG@5 0.368-0.379 (spread 0.011) — tight variance indicating the ceiling is feature expressiveness, not hyperparameters.",
          ]
        # - [
        #     "Neural ranker and inference failure modes:",
        #     "Custom ApproxNDCG listwise loss function. Two inference failure modes identified and corrected: BatchNorm statistics degrade when scoring single candidates at inference vs. groups of 25 at training; unscaled graded labels bias the loss 31× toward rare high-relevance events.",
        #   ]
        - [
            "Model behavior analysis:",
            "Neural ranker NDCG@5 0.110 vs. LightGBM 0.379; val loss below train loss rules out overfitting. Gap is architectural: trees make exact splits on dominant continuous signals and handle sparse ID features natively — advantages that erode at the embedding dimensionality and candidate-set scale of production retrieval systems.",
          ]
