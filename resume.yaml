  - name: "Intent-Aware Lookahead for Language Modeling"
    enabled: true
    url: "https://github.com/utd-fall-25-cs-6320-nlp/cs6320-nlp-project"
    type: "academic"
    description: "Investigated whether lightweight future-token prediction could improve next-token accuracy in autoregressive language models. Designed and evaluated IALM-Lite, a causal transformer architecture augmented with an auxiliary future prediction head, intent pooling, and FiLM/gated fusion modules. Conducted systematic experiments across 21 model variants on WikiText-2, yielding rigorous negative results with analysis of multi-task interference and capacity allocation."
    role: "Researcher / Co-Developer"
    start_date: "2025-08"
    end_date: "2025-12"
    highlights:
      - "Proposed and implemented IALM-Lite: a causal transformer (6-layer, 44.9M params) extended with a future prediction head, intent pooling (mean and attention), and fusion modules (FiLM and gated)"
      - "Evaluated 21 model variants across a hyperparameter grid of future horizon, auxiliary loss weight, pooling method, and fusion mechanism"
      - "Identified auxiliary loss weight λ as the dominant performance factor, with λ=0.3 producing 3.7× worse perplexity than λ=0.1"
      - "Demonstrated that vanilla baseline (PPL 141.2) outperforms best auxiliary-only (235.4, +66.7%) and best IALM-Lite (292.4, +107.0%) variants"
