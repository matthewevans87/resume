    - key: vision-based-sim-to-real-manipulation-pipeline
      group: machine_learning
      name: "Vision-Based Sim-to-Real Manipulation Pipeline"
      url: "https://github.com/matthewevans87/so101_sim_to_real"
      type: academic
      description: "Designed and built an end-to-end ML pipeline for training vision-based perception and control policies under domain randomization (lighting, camera pose, object geometry, distractors) targeting zero-shot sim-to-real transfer — achieving up to 89.7% task success on a wrist-camera-only manipulation benchmark in NVIDIA Isaac Sim. Multimodal sensor fusion across RGB imagery, joint-state telemetry, and object-pose data across ~10K synthetic episodes."
      role: "Research Engineer / Author"
      start_date: "2026-01"
      end_date: "2026-06"
      highlights:
        - [
            "ML infrastructure:",
            "Built a reproducible end-to-end pipeline (train → collect → curate → train-cnn) with typed YAML validation, versioned artifact directories (configs, seeds, checkpoints, metrics), and provenance tracking for systematic experimentation and run-to-run comparison.",
          ]
        - [
            "Reinforcement learning:",
            "Applied PPO to a vision-based manipulation task with phased reward shaping (approach → grasp → lift), safety-aware termination, and domain randomization (lighting, camera pose, object geometry, distractors) for sim-to-real transfer.",
          ]
        - [
            "Vision encoder evaluation:",
            "Bootstrapped a task-specific CNN from synthetic policy rollouts via iterative self-distillation, replacing a frozen ResNet18 ImageNet backbone: +4.5pp success rate (87.1% vs. 83.1%), with a 2nd distillation generation reaching 87.7%.",
          ]
        - [
            "Data pipelines:",
            "Processed ~10K episodes of multimodal telemetry (images, joint state, object pose); applied histogram rebalancing across timestep and grip-zone distance to prevent mid-approach frames from skewing CNN training.",
          ]
        - [
            "Ablation framework:",
            "Built a sweep runner for Cartesian-product ablations across reward functions, vision backbones, and PPO hyperparameters (5 RNG seeds each), capturing per-experiment provenance and per-condition success/lift/termination stats.",
          ]
        - [
            "Reward shaping analysis:",
            "Via leave-one-out / leave-one-in ablations (5 seeds × 50k PPO steps) on rewards, identified the dense absolute approach reward as a soft local optimum — removing it yielded the best result observed (89.7%, +2pp over the 13-term baseline) with shorter episodes; a derived 2-term minimal reward matched the full set within noise.",
          ]
