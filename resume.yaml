projects_config:
  title: "Applied Machine Learning Experience"
  group_by_type: false

projects:
  - name: "Vision-Based Sim-to-Real Manipulation Pipeline"
    enabled: true
    url: "https://github.com/matthewevans87/so101_sim_to_real"
    type: "academic"
    description: "Designed and built an end-to-end ML pipeline for training vision-conditioned PPO policies on the SO-101 robotic arm in NVIDIA Isaac Sim, targeting zero-shot sim-to-real transfer — achieving up to 89.7% episode success rate on a wrist-camera-only cube-lifting task under domain randomization."
    role: "Research Engineer / Author"
    start_date: "2026-01"
    end_date: "2026-05"
    highlights:
      - [
          "ML infrastructure:",
          "Designed a reproducible end-to-end pipeline (train → collect → curate → train-cnn) with typed YAML validation, versioned artifact directories (configs, seeds, checkpoints, metrics), and provenance tracking — enabling systematic experimentation, reliable debugging, and direct run-to-run comparison.",
        ]
      - [
          "Reinforcement learning:",
          "Applied PPO to a vision-based sequential decision-making task; designed phased reward shaping (approach → grasp → lift), safety-aware termination conditions, and domain randomization (lighting, camera pose, object geometry, distractors) in service of sim-to-real transfer.",
        ]
      - [
          "Vision encoder evaluation:",
          "Bootstrapped a task-specific CNN from synthetic policy rollouts via iterative self-distillation, replacing a frozen ImageNet backbone (ResNet18); CNN achieved 4.5pp higher episode success rate (87.1% vs. 83.1%), with a second distillation generation yielding further improvement (87.7%).",
        ]
      - [
          "Data pipelines:",
          "Collected and processed ~10K episodes of multimodal telemetry (images, joint state, object pose); applied histogram rebalancing across episode timestep and grip-zone distance to prevent dominant mid-approach frames from skewing CNN training.",
        ]
      - [
          "Ablation framework:",
          "Developed a sweep runner executing Cartesian-product ablations across reward functions, vision backbones, and PPO hyperparameters (each over 5 RNG seeds); uncovered that ablating a dense absolute reward for the grasp phase eliminated a soft local optimum, improving both success rate and time-to-first-success.",
        ]
      - [
          "Reward shaping analysis:",
          "Identified through systematic ablations that the dense absolute reward for the approach phase acted as a soft local optimum — ablating it yielded the highest success rate observed across all experiments (89.7%, +1.9pp over baseline) with shorter mean episode length, consistent with the policy committing to task completion rather than hovering in a rewarded near-approach posture.",
        ]
    technologies:
      - "Python"
      - "PyTorch"
      - "NVIDIA Isaac Sim"
      - "Isaac Lab"
      - "skrl (PPO)"
      - "Reinforcement Learning"
      - "CNN"
      - "ResNet18"
      - "Domain Randomization"
      - "YAML configs"
      - "TensorBoard"
      - "NumPy"

  - name: "ML Assisted Visibility Graph Construction"
