projects:
  - name: "Vision-Based Manipulation via Sim-to-Real RL"
    enabled: true
    url: "https://github.com/utd-fall-25-cs-6341-robotics/cs6341-robotics-project-direct"
    type: "academic"
    description: "Developed a complete sim-to-real RL pipeline for vision-based cube manipulation on the SO-101 robotic arm using NVIDIA Isaac Sim and Isaac Lab. Trained vision-conditioned PPO policies with asymmetric actor-critic architecture, frozen ResNet18 + spatial softmax encoding, and extensive domain randomization. Achieved zero-shot sim-to-real transfer for a proprioception-only task and demonstrated cube-seeking behavior in the vision-based task."
    role: "Researcher / Co-Developer"
    start_date: "2025-08"
    end_date: "2025-12"
    highlights:
      - "Implemented two Isaac Lab tasks: proprioception-only end-effector height maximization (4,096 parallel envs) and vision-based cube interaction (32 parallel envs)"
      - "Designed asymmetric actor-critic PPO architecture with frozen ResNet18 + spatial softmax (1024-D) for the actor and privileged sim state for the critic"
      - "Built multi-stage gated reward structure (distance → contact → lift) to prevent reward hacking during training"
      - "Applied extensive per-episode domain randomization: camera augmentation pipeline (blur, noise, brightness, pose jitter), lighting variation, distractor objects, and cube placement randomization"
      - "Achieved zero-shot sim-to-real transfer for proprioception task; vision policy demonstrated partial cube-seeking behavior on physical hardware"
      - "Documented engineering challenges: reward hacking, servo imprecision, camera quality gap, and sim-to-real perception mismatch"
    technologies:
      - "Python"
      - "PyTorch"
      - "NVIDIA Isaac Sim / Isaac Lab"
      - "PPO / RL (SKRL)"
      - "ResNet18"
      - "LeRobot API"
      - "TensorBoard"
    metrics:
      - "Zero-shot sim-to-real transfer (proprioception task)"
      - "4,096 parallel training environments"

  - name: "ML Assisted Visibility Graph Construction"
    enabled: true
    url: "https://github.com/matthewevans87/cs6319-computational-geometry-project"
    type: "academic"
    description: "Augmented the naive visibility-graph algorithm with a learned LSTM-based sector predictor for motion planning in bounded planes with polygonal obstacles. The model restricts visibility checks to predicted regions containing shortest-path vertices, sharply reducing graph-construction overhead while closely matching exact path lengths."
    role: "Researcher / Lead Developer"
    start_date: "2025-01"
    end_date: "2025-12"
    highlights:
      - "Developed custom StarCraft map parser using RichChk to extract tile walkability, producing binary obstacle matrices for 1,670 maps"
      - "Constructed polygonal obstacle representations from connected components using alpha shapes and Shapely with colinear point removal"
      - "Designed LSTM-based RNN model with sector geometry (256-dim rasterized binary vector) and global start/end features to predict next-sector in shortest path sequence"
      - "Trained model with five-fold cross-validation achieving 82.1% validation accuracy"
      - "Integrated model with DFS-based visibility graph construction, pruning checks to model-suggested sectors with dynamic programming over reachable vertices"
      - "Achieved up to 98% reduction in vertex comparisons on StarCraft map benchmarks"
    technologies:
      - "Python"
      - "PyTorch"
      - "LSTM / RNN"
      - "scipy"
      - "Shapely"
      - "NumPy"
      - "Dijkstra's Algorithm"
    metrics:
      - "Up to 98% reduction in vertex comparisons"
      - "82.1% validation accuracy"

