    - cs6375-project4-part1
    - cs6375-project3-part1
    - cs6320-nlp-assignment1
  disabled:
    # cs6375 = ML
    # cs6320 = NLP
    # cs6347 = SM of ML
    - crypto-currency-trading-bot
    - neural-networks-independent-study
    - so101_infer
    - cs6375-project3-part2
    - cs6375-project2
    - cs6320-nlp-assignment2
    - nn-web-demo-mlp
    - nn-gan
    - nn-rnn
    - cs6347-hw2
    - cs6347-hw3-gibbs
    - cs6347-hw3-mle
    - cs6347-hw4-em
    - cs6347-hw4-em-colorem
    - imgtool
    - framepipe
  elements:
    - key: cs6375-project1
      group: machine_learning
    - key: cs6375-project4-part1
      group: machine_learning
    - key: cs6375-project3-part1
      group: machine_learning
    - key: cs6320-nlp-assignment1
      group: machine_learning

    - key: expedia-learning-to-rank
      group: machine_learning
      name: "Search Ranking & Retrieval Pipeline"
      url: "https://github.com/matthewevans87/expedia-ltr"
      description: "End-to-end learning-to-rank pipeline over ~1M real hotel-search logs: two-tower retrieval, a listwise neural ranker, and a LightGBM LambdaRank baseline, with full query-grouped evaluation (NDCG@k, MRR, Recall@k) across an 18-run sweep."
      role: "Author"
      start_date: "2026-06"
      end_date: "2026-06"
      render_style: minimal
      technologies:
        - "Python"
        - "TensorFlow"
        - "LightGBM"
        - "Two-Tower Retrieval"
        - "Learning-to-Rank"
        - "NDCG / MRR / Recall@k"

    - key: intent-aware-lookahead-for-language-modeling
      group: machine_learning
      name: "Intent-Aware Lookahead for Language Modeling"
      url: "https://github.com/utd-fall-25-cs-6320-nlp/cs6320-nlp-project"
      description: "Transformer LM research: built a 6-layer causal transformer (~45M params) with auxiliary future-token prediction, intent pooling, and FiLM/gated fusion; evaluated across 21 controlled variants with honest negative results and interference analysis."
      role: "Author"
      start_date: "2025-08"
      end_date: "2025-12"
      render_style: minimal
      technologies:
        - "Python"
        - "PyTorch"
        - "Transformers"
        - "TensorBoard"

    - key: crypton
      group: machine_learning
      name: "Crypton — Multi-Agent LLM System"
      url: "https://github.com/matthewevans87/crypton-cli"
      description: "Exploration of agentic GenAI: five specialized LLM agents coordinating through a 12-tool registry and structured messaging, with a deterministic execution layer cleanly separated from the non-deterministic LLM layer."
      end_date: "2026-04"
      render_style: minimal
      technologies:
        - "C# / .NET 10"
        - "Ollama (local LLM inference)"
        - "Multi-agent orchestration"
        - "Prompt engineering"
        - "Tool registry / sandboxed execution"

    - key: ml-assisted-visibility-graph-construction
      render_style: minimal

    - key: vision-based-sim-to-real-manipulation-pipeline
      render_style: minimal

