order_by:
  - experience
  - projects
  - education
  - achievements
  - skills

mission_statement:
  - "Full-Stack Software Engineer with 15 years' experience shipping production systems. M.S. Computer Science (ML) from UT Dallas (2025)."
  - "Delighting clients and stakeholders with strategy-aligned delivery-focused engineering leadership and execution across the enterprise SDLC."

qualifications:
  title: "Qualifications"
  items:
    - "Enterprise software delivery: 15 years building and shipping production systems, including multi-tenant enterprise and consumer facing SaaS products across consulting and in-house roles."
    - "Leadership: led multiple simultaneous delivery teams across multiple clients with engineering budgets exceeding $4MM/year; handled stakeholder discovery, SOW drafting, contract execution, VMO/MSP navigation, and executive relationships. Hired, trained, and mentored numerous software engineers at various stages in their careers."
    - "Full-stack product engineering and delivery: C#/.NET, TypeScript, Angular, React, SQL Server, and APIs — with automated testing, CI/CD pipelines, and release automation across AWS and Azure."
    - "Cloud infrastructure and operations: event-driven ETL, containers, and serverless/Fargate workloads on AWS and Azure, with application logging and metrics (Application Insights, CloudWatch, Seq). Fully-scripted IoC defined cloud environments."
    - "Breadth of domains and users: shipped both internal enterprise tools and consumer-facing products spanning healthcare, financial services, manufacturing, architecture, transit, and data-center operations — serving executives, business teams, and external end users."
    - "Data-heavy optimization and analytics: built ranking, forecasting, matching, and reporting systems with strong SQL, data preparation, and performance tuning."
    - "Machine Learning: 3 years academic and independent research designing, training, and evaluating ML models for classification, ranking, retrieval, NLP, perception, and sequential decision making (RL/PPO)."

projects_config:
  title: "Open-Source & Emerging-Technology Projects"

experience:
  elements:
    - key: independent-consultant
      expanded: true
      projects_expanded: false # ERP and code-generation platform are the headline; no nested project list to surface.
    - key: zeal-it-consultants
      expanded: true
      projects_expanded: true # Multiple client SaaS deliveries read better when the project list is visible.
    - key: hks-inc
      expanded: true
      projects_expanded: false
      positions:
        elements:
          - key: sr-software-engineer
            highlights:
              - "Successfully implemented piecemeal migration from AngularJS to Angular 7 with both frameworks running simultaneously"
              - "Led development of Project Explorer - comprehensive project information and asset reference library"
              - "Established CI/CD pipelines and Azure DevOps workflows"
            projects:
              disabled:
                - nominator
                - project-explorer # Referenced in the role highlight; don't also render a card for it.
    - key: clean-harbors-inc
      expanded: true

education:
  elements:
    - key: master-of-science
      courses: []

# Enterprise SaaS projects are shown inline under their roles (Zeal, HKS) via
# projects_expanded, so they are NOT repeated here. This section is reserved for
# ML / GenAI work, rewritten concisely, that reads as differentiating in a SaaS context.
