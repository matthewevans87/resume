# Headline bullet list mapped 1:1 to the RTX JD's "Qualifications You Must Have"
# (degree+experience, AI/ML signal-processing-style work, SCM/VCS/SDLC, clearance)
# and the relevant "Qualifications We Prefer" items (advanced STEM degree, math
# modeling, Python, UNIX/Linux). Items are ordered to mirror the JD's own order.
qualifications:
  title: "Qualifications"
  items:
    - "Education & Experience: M.S. Computer Science (Machine Learning), UT Dallas (2026) + B.S.; 15 yrs production software; applied ML experience spanning robotics perception, language modeling, and motion planning"
    - "AI/ML for sensing & perception: Vision-based RL (PPO) policies under domain randomization for sim-to-real transfer (89.7% task success); multimodal sensor fusion across RGB imagery, joint-state telemetry, and object pose; LSTM-pruned visibility-graph construction for shortest-path motion planning"
    - "Statistical modeling & analytical problem-solving: Statistical forecasting models (R, R.NET) in production at Clean Harbors; controlled ablations across 21 LM variants and PPO reward-shaping sweeps (Cartesian grids × 5 RNG seeds) with quantitative run-to-run comparison"
    - "Software development processes: Git / version control, peer code review, CI/CD pipelines (GitHub Actions, Azure DevOps YAML), YAML configs, versioned artifacts, provenance tracking"
    - "Programming: Python (PyTorch, NumPy, SciPy), C# / .NET (15 yrs), TypeScript, SQL"
    - "UNIX/Linux: Daily Linux development; Docker containers; AWS ECS / Fargate"
    - "Clearance: U.S. citizen; eligible for DoD security clearance sponsorship"

