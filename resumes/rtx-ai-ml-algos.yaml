# Reorder: SO-101 first (perception/sensor story), then language modeling (negative-results
# bullet defense engineers respect), then visibility graph (LSTM + motion planning), then
# neural networks independent study. Disabled projects omitted from array.
projects:
  elements:
    - key: vision-based-sim-to-real-manipulation-pipeline
      name: "Vision-Based Sim-to-Real Manipulation Pipeline"
      url: "https://github.com/matthewevans87/so101_sim_to_real"
      type: "academic"
      description: "Designed and built an end-to-end ML pipeline for training vision-based perception and control policies under domain randomization (lighting, camera pose, object geometry, distractors) targeting zero-shot sim-to-real transfer — achieving up to 89.7% task success on a wrist-camera-only manipulation benchmark in NVIDIA Isaac Sim. Multimodal sensor fusion across RGB imagery, joint-state telemetry, and object-pose data across ~10K synthetic episodes."
      role: "Research Engineer / Author"
      start_date: "2026-01"
      end_date:
      highlights:
        - ["ML infrastructure:", "Designed a reproducible end-to-end pipeline (train → collect → curate → train-cnn) with typed YAML validation, versioned artifact directories (configs, seeds, checkpoints, metrics), and provenance tracking — enabling systematic experimentation, reliable debugging, and direct run-to-run comparison."]
        - ["Reinforcement learning:", "Applied PPO to a vision-based sequential decision-making task; designed phased reward shaping (approach → grasp → lift), safety-aware termination conditions, and domain randomization (lighting, camera pose, object geometry, distractors) in service of sim-to-real transfer."]
        - ["Vision encoder evaluation:", "Bootstrapped a task-specific CNN from synthetic policy rollouts via iterative self-distillation, replacing a frozen ImageNet backbone (ResNet18); CNN achieved 4.5pp higher episode success rate (87.1% vs. 83.1%), with a second distillation generation yielding further improvement (87.7%)."]
        - ["Data pipelines:", "Collected and processed ~10K episodes of multimodal telemetry (images, joint state, object pose); applied histogram rebalancing across episode timestep and grip-zone distance to prevent dominant mid-approach frames from skewing CNN training."]
        - ["Ablation framework:", "Developed a sweep runner executing Cartesian-product ablations across reward functions, vision backbones, and PPO hyperparameters (each over 5 RNG seeds); uncovered that ablating a dense absolute reward for the grasp phase eliminated a soft local optimum, improving both success rate and time-to-first-success."]
        - ["Reward shaping analysis:", "Identified through systematic ablations that the dense absolute reward for the approach phase acted as a soft local optimum — ablating it yielded the highest success rate observed across all experiments (89.7%, +1.9pp over baseline) with shorter mean episode length, consistent with the policy committing to task completion rather than hovering in a rewarded near-approach posture."]
      technologies:
        - "Python"
        - "PyTorch"
        - "NVIDIA Isaac Sim"
        - "Isaac Lab"
        - "skrl (PPO)"
        - "Reinforcement Learning"
        - "CNN"
        - "ResNet18"
        - "Domain Randomization"
        - "YAML configs"
        - "TensorBoard"
        - "NumPy"

    - key: intent-aware-lookahead-for-language-modeling
      name: "Intent-Aware Lookahead for Language Modeling"
      url: "https://github.com/utd-fall-25-cs-6320-nlp/cs6320-nlp-project"
      type: "academic"
      description: "Investigated whether lightweight future-token prediction improves next-token accuracy in causal language models — designing, implementing, and evaluating a modified transformer with auxiliary lookahead heads and intent-conditioned fusion across 21 controlled model variants."
      role: "Research Engineer / Author"
      start_date: "2025-08"
      end_date: "2025-12"
      highlights:
        - ["Model architecture:", "Designed and implemented IALM-Lite, a 6-layer causal transformer (~44.9M params) augmented with auxiliary future-prediction heads, intent pooling (mean/attention), and FiLM vs. gated fusion mechanisms."]
        - ["Experiment design:", "Ran a controlled ablation study of 21 variants across a grid of lookahead horizon, auxiliary loss weight, pooling method, and fusion mechanism; identified auxiliary loss weight (λ) as the dominant factor shaping training dynamics."]
        - ["Evaluation & negative results:", "Benchmarked all variants against a matched baseline on WikiText-2; baseline outperformed all lookahead variants — documented findings with analysis of multi-task interference and capacity allocation to inform future designs."]
      technologies:
        - "Python"
        - "PyTorch"
        - "Transformers"
        - "TensorBoard"

    - key: ml-assisted-visibility-graph-construction
      name: "ML Assisted Visibility Graph Construction"
      url: "https://github.com/matthewevans87/cs6319-computational-geometry-project"
      type: "academic"
      description: "Reduced visibility-graph construction cost for shortest-path motion planning by training an LSTM to predict the next shortest-path region, pruning visibility checks while preserving near-exact path quality — achieving up to 98% reduction in vertex comparisons on benchmarks."
      role: "Research Engineer / Author"
      start_date: "2025-01"
      end_date: "2025-12"
      highlights:
        - ["Data pipeline:", "Parsed 1,670 StarCraft maps into binary walkability grids; converted obstacle regions to polygonal representations via connected components and alpha shapes with geometric cleanup using Shapely."]
        - ["Model training:", "Designed and trained an LSTM-based sector predictor with five-fold cross-validation, achieving 82.1% validation accuracy; integrated predictions into DFS/DP-based visibility-graph construction to gate visibility checks."]
        - ["Evaluation:", "Benchmarked pruned vs. exact graph construction across map geometries; achieved up to 98% reduction in vertex comparisons while closely matching exact shortest-path lengths."]
      technologies:
        - "Python"
        - "PyTorch"
        - "LSTM"
        - "RNN"
        - "SciPy"
        - "Shapely"
        - "NumPy"

    - key: neural-networks-independent-study
      name: "Neural Networks Independent Study"
      url: "https://github.com/matthewevans87/neural-networks-independent-study"
      type: "academic"
      description: "A structured 15-week independent study spanning modern deep learning fundamentals through foundation models — combining paper-driven survey (backprop → CNNs/ResNets → LSTMs → Transformers → diffusion/VLMs) with from-scratch PyTorch implementations, culminating in a master's thesis proposal for a Transformer-based autonomous driving model with vision-only planning, low-level control, and a CARLA-based imitation learning training plan."
      role: "Research Engineer / Course Designer / Author"
      start_date: "2025-01"
      end_date: "2025-05"
      technologies:
        - "Python"
        - "PyTorch"
        - "NumPy"
        - "CNN"
        - "MLP (from scratch)"
        - "LSTM"
        - "GAN"
        - "Transformers"
        - "LaTeX"

