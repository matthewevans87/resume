    - "Applied algorithm and sensor-data depth: Built vision-conditioned RL policies processing multimodal sensor streams (camera, joint-state, object pose) under domain randomization for sim-to-real transfer, with systematic ablation evaluation across reward functions and vision backbones — relevant depth as software-defined sensing increasingly incorporates learned algorithms (see Vision-Based Sim-to-Real Manipulation Pipeline)."

