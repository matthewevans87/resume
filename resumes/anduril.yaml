# Full skills replacement — arrays replace wholesale.
# Promote Simulation & Agent Training to its own top-level category (mirrors
# the JD's "modeling and simulation solutions for agent training" and
# "SITL and HITL simulation infrastructure" bullets). Promote Docker /
# containerization to the front of the infrastructure category since it's
# explicitly a Required qualification.
skills:
  - category: "AI/ML & Experimentation"
    items:
      - "PyTorch"
      - "NumPy"
      - "TensorBoard"
      - "Reinforcement Learning (PPO, skrl)"
      - "Experiment design / ablations"
      - "Evaluation harnesses & metrics"

  - category: "Simulation & Agent Training"
    items:
      - "NVIDIA Isaac Sim / Isaac Lab"
      - "Sim-to-real transfer"
      - "Domain randomization (lighting, camera pose, geometry, distractors)"
      - "Multimodal telemetry pipelines (vision, joint state, object pose)"
      - "ROS"
      - "LeRobot"

  - category: "Infrastructure, Containers & CI/CD"
    items:
      - "Docker (images, containers, multi-service deployments)"
