      - "AWS (S3, SQS, Athena, CloudFormation, Lambda)"
      - "Azure (App Service, Storage, DevOps)"
      - "CI/CD pipelines (GitHub Actions, Azure DevOps YAML)"
      - "Observability (CloudWatch, Application Insights, Seq)"
