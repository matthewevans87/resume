# Per-route override for the Anduril Senior Software Engineer, Machine Learning
# role on the Discovery team (Washington, DC). Loaded at `#/anduril`.
#
# Tailoring strategy:
#   - Mirror the JD's vocabulary almost word-for-word in the summary
#     ("infrastructure, simulation solutions, and integrations for agent
#     development", "data analysis and validation workflows").
#   - Compress the enterprise/delivery-manager framing in the Experience
#     section so the Discovery team reads "fast-paced engineering IC", not
#     "delivery lead navigating MSPs and SOWs".
#   - Promote Simulation to its own top-level skills category — the JD
#     mentions simulation 5+ times and Isaac Sim shouldn't be buried.
#   - Open to relocation (role is in DC).

personal:
  title: "Senior Software Engineer, Machine Learning"
  location: "Open to Relocation"
  # No map link for a non-geographic location.
  location_url: ""

mission_statement:
  - "Software Engineer with 15 years' experience shipping production systems, paired with a recent M.S. in Computer Science from UT Dallas (Intelligent Systems & Machine Learning)."
  - "I build the ML training infrastructure and simulation pipelines that let agents learn — typed configs, versioned artifacts, ablation sweeps, and the data analysis and validation workflows that turn experiments into decisions. Looking to join mission-aligned teams where trust, competence, and humility meet the world's hardest problems."

# JD vocabulary — the headline strip should read as engineering domains, not
# tools. Docker still appears in Skills below; here we surface RL and
# multimodal-sensor work, both of which are stronger Anduril signals than a
# generic "Docker" badge.
skills_highlight:
  title: "Engineering Strengths"
  items:
    - ML Training Infrastructure
    - Simulation for Agent Training
    - Data Analysis & Validation Workflows
    - Reinforcement Learning
    - Multimodal Sensor Data

# Frame the section explicitly around the JD's domain.
projects_config:
  title: "Machine Learning & Simulation Experience"
  group_by_type: false

