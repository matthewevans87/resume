# Per-route override for Google — Software Engineer III, AI/ML, Core (Sunnyvale).
# Loaded when the page is visited at `#/google`.
#
# The base resume's ML-engineering framing already maps cleanly to this JD:
# RL (PPO), ML infrastructure, model evaluation, data pipelines, debugging,
# and a 15-year production-systems track record covering distributed
# computing, large-scale data, and CI/CD. Override is intentionally light:
# title, mission, headline strip, location.

personal:
  title: "Software Engineer, AI/ML"
  location: "Open to Relocation"
  # No map link for a non-geographic location.
  location_url: ""

mission_statement:
  - "Software Engineer with 15 years' experience shipping production systems across enterprise and consulting environments, paired with a recent M.S. in Computer Science from UT Dallas (Intelligent Systems & Machine Learning)."
  - "My recent applied-ML work builds the infrastructure — training pipelines, evaluation harnesses, and ablations — that turns research questions into measurable answers, with hands-on focus on reinforcement learning and vision-based sim-to-real transfer. Looking to solve foundational problems at Google."

# Each item maps directly to JD language:
#   - "ML Infrastructure"               → min qual + responsibilities
#   - "Model Evaluation & Debugging"    → min qual ("model evaluation, debugging")
#   - "Reinforcement Learning"          → min qual (sequential decision making)
#   - "Production Systems at Scale"     → 15-year SWE track record; lets the
#                                         reviewer infer "distributed" from the
#                                         experience section rather than claiming
#                                         Spanner/Bigtable-class depth we can't
#                                         defend in interviews.
skills_highlight:
  title: "Engineering Strengths"
  items:
    - ML Infrastructure
    - Model Evaluation & Debugging
    - Reinforcement Learning
    - Production Systems at Scale

# Hide early-career roles to reclaim space. The 15-year tenure claim in the
# mission statement plus the 2012 BS graduation already establish the timeline,
# and the Clarity ETL bullet under Zeal carries the distributed-scale signal.
# Cisco stays — brand-recognition value at the resume-screen stage.
disable:
  experience:
    - "Clickmotive, Inc."
    - "Ericsson, Inc."

# Tightened skills for the Google AI/ML route — drops .NET-ecosystem
# databases (Cosmos, EF) and consulting-flavored CI/CD entries (Azure
# DevOps YAML) that don't add signal here, and folds the standalone
# "Software Engineering" line into adjacent categories. Goal: pull the
# orphaned tail line back onto the previous page without losing any
# JD-relevant keyword.
skills:
  - category: "AI/ML, Robotics & Experimentation"
    items:
      - "PyTorch"
      - "NumPy"
      - "TensorBoard"
      - "NVIDIA Isaac Sim / Isaac Lab"
      - "ROS"
      - "LeRobot"

  - category: "ML Systems & Data"
    items:
      - "Experiment design / ablations"
      - "Evaluation harnesses & metrics"
      - "ETL / Data Pipelines"
      - "Distributed systems fundamentals"
      - "Message queues (RabbitMQ, AWS SQS)"
      - "Analytics (AWS Athena)"

  - category: "Programming Languages"
    items:
      - "Python"
      - "C#"
      - "TypeScript"
      - "SQL"

  - category: "Infrastructure & CI/CD"
    items:
      - "Linux"
      - "Docker"
      - "AWS (S3, SQS, Athena, ECS / Fargate, Lambda, CloudFormation)"
      - "Azure (App Service, Storage, DevOps)"
      - "Observability (CloudWatch, Application Insights)"
      - "CI/CD (GitHub Actions)"

  - category: "Databases & Data Stores"
    items:
      - "SQL Server"
      - "PostgreSQL / PostGIS"
      - "Redis"
