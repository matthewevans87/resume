    - "Reinforcement learning in complex environments: Applied PPO to a vision-based manipulation task with phased reward shaping (approach → grasp → lift), safety-aware termination, and domain randomization for sim-to-real transfer — 89.7% task success on a wrist-camera-only benchmark in NVIDIA Isaac Sim"
